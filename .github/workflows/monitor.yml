name: 予約枠監視

on:
  schedule:
    - cron: '0 0 * * *'   # JST 9:00 起動
    - cron: '0 6 * * *'   # JST 15:00 起動
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 370   # 6時間 + 余裕

    steps:
      - uses: actions/checkout@v4

      - name: Check availability and notify
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TARGET_URL: ${{ vars.TARGET_URL }}
        run: python monitor_ci.py
