name: 予約枠監視

on:
  schedule:
    - cron: '*/5 21-23,0-12 * * *'  # JST 6:00-21:00 (UTC 21:00-12:00)
  workflow_dispatch:

concurrency:
  group: reservation-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - name: Restore notification state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: reservation-state-${{ github.run_id }}
          restore-keys: reservation-state-

      - name: Check availability and notify
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TARGET_URL: ${{ vars.TARGET_URL }}
        run: python monitor_ci.py

      - name: Save notification state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: reservation-state-${{ github.run_id }}
