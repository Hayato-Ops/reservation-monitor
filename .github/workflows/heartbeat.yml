name: 監視稼働確認

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日 JST 9:00 (UTC 0:00)
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Slack通知
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TARGET_URL: ${{ vars.TARGET_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\"📡 予約枠監視は正常稼働中です\n🔗 <${TARGET_URL}|予約ページ>\"}"
